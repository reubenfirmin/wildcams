name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        # CPU torch is pinned via [tool.uv.sources] in pyproject.toml.
        run: uv sync --python 3.13 --extra dev

      - name: Run tests
        run: uv run --python 3.13 pytest -q
